  # --- GNB 1: UERANSIM (eMBB / URLLC) - IP: 192.168.71.201 --------
  # =================================================================
  
  ueransim-gnb1:
    container_name: "ueransim-gnb1"
    image: ueransim:latest
    privileged: true
    volumes:
      - ./config/gnb1.yaml:/ueransim/config/gnb.yaml
    entrypoint: /ueransim/bin/nr-gnb -c /ueransim/config/gnb.yaml
    networks:
      ran-access-network:
        ipv4_address: 192.168.71.201
      inter-upf-transit-network:
        ipv4_address: 192.168.72.201
    depends_on:
      - oai-amf

  ueransim-ue1:
    container_name: "ueransim-ue1"
    image: ueransim:latest
    privileged: true
    cap_add:
      - NET_ADMIN 
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config/ue1.yaml:/ueransim/config/ue.yaml
    entrypoint: /ueransim/bin/nr-ue -c /ueransim/config/ue.yaml
    networks:
      ran-access-network:
        ipv4_address: 192.168.71.211
    depends_on:
