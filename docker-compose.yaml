version: '3.8'

networks:
  # 1. Common Control Network: Connects DB, AMF, NSSF, UDM, UDR, AUSF, and Slices' NRFs/SMFs
  common-control-network:
    name: common-control-net
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.70.0/24

  # 2. RAN Access Network: Connects gNBs to AMF (N2) and ULCL entry point (N3)
  ran-access-network:
    name: ran-access-net
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.71.0/24

  # 3. Inter-UPF Transit Network: Exclusive for ULCL traffic routing to Local UPFs (N9)
  inter-upf-transit-network:
    name: inter-upf-transit-net
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.72.0/24

  # 4. Data Network Servers: Connects final UPFs to the 4 Data Application Servers (N6)
  data-network-servers:
    name: data-network-srv
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.73.0/24

services:

  # --- INFRASTRUCTURE BASE: DATABASE SERVICE ---
  mysql:
    container_name: mysql
    image: mysql:8.0
    privileged: true
    environment:
      - MYSQL_ROOT_PASSWORD=linux
      - MYSQL_DATABASE=oai_db
      - MYSQL_USER=test
      - MYSQL_PASSWORD=test
    volumes:
      - ./database/oai_db_custom.sql:/docker-entrypoint-initdb.d/oai_db.sql:ro
    networks:
      common-control-network:
        ipv4_address: 192.168.70.131
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- NETWORK SLICE SELECTION FUNCTION (NSSF) ---
  oai-nssf:
    container_name: "oai-nssf"
    image: oaisoftwarealliance/oai-nssf:v1.5.0
    environment:
      - TZ=Europe/Paris
      - INSTANCE=0
      - PID_DIRECTORY=/var/run
      - NSSF_NAME=OAI_NSSF
      - SBI_IF_NAME=eth0
      - SBI_PORT=80
      - NSSF_PORT=80
      - USE_FQDN_DNS=no
      - AMF_IPV4_ADDRESS=192.168.70.138
      - AMF_PORT=80
      - AMF_API_VERSION=v1
      - AMF_FQDN=oai-amf
      - NSSF_SLICE_INFO=1,000001,2,000002,3,000003,4,000004
      - SBI_API_VERSION=v1
      - SBI_PORT_HTTP1=80
      - SBI_PORT_HTTP2=8080
      - NSSF_SLICE_CONFIG=/openair-nssf/etc/nssf_slice_config.yaml
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    volumes: 
      - /home/psondi/oai-cn5g-fed/docker-compose/Projet4Slices/config/nssf_slice_config.yaml:/openair-nssf/etc/nssf_slice_config.yaml
    networks:
      common-control-network:
        ipv4_address: 192.168.70.132
    depends_on:
      mysql:
        condition: service_healthy

  # --- UNIFIED DATA REPOSITORY (UDR) ---
  oai-udr:
    container_name: "oai-udr"
    image: oaisoftwarealliance/oai-udr:v1.5.0
    environment:
      - INSTANCE=0
      - TZ=Europe/Paris
      - PID_DIRECTORY=/var/run
      - UDR_NAME=oai-udr
      - UDR_FQDN=udr.oai-5gcn.eur
      - UDR_INTERFACE_NAME_FOR_NUDR=eth0
      - UDR_PORT_FOR_NUDR=80
      - UDR_API_VERSION_FOR_NUDR=v1
      - UDR_PORT_HTTP2_FOR_NUDR=8080
      - MYSQL_IPV4_ADDRESS=192.168.70.131
      - MYSQL_USER=test
      - MYSQL_PASS=test
      - MYSQL_DB=oai_db
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    networks:
      common-control-network:
        ipv4_address: 192.168.70.133
    depends_on:
      mysql:
        condition: service_healthy

  # --- UNIFIED DATA MANAGEMENT (UDM) ---
  oai-udm:
    container_name: "oai-udm"
    image: oaisoftwarealliance/oai-udm:v1.5.0
    environment:
      - TZ=Europe/Paris
      - INSTANCE=0
      - PID_DIRECTORY=/var/run
      - UDM_NAME=OAI_UDM
      - SBI_IF_NAME=eth0
      - SBI_PORT=80
      - UDM_VERSION_NB=v1
      - USE_FQDN_DNS=no
      - UDR_IP_ADDRESS=192.168.70.133 
      - UDR_PORT=80
      - UDR_VERSION_NB=v1
      - UDR_FQDN=oai-udr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    networks:
      common-control-network:
        ipv4_address: 192.168.70.134
    depends_on:
      oai-udr:
        condition: service_started

  # --- AUTHENTICATION SERVER FUNCTION (AUSF) ---
  oai-ausf:
    container_name: "oai-ausf"
    image: oaisoftwarealliance/oai-ausf:v1.5.0
    privileged: true
    environment:
      - TZ=Europe/Paris
      - INSTANCE=0
      - PID_DIRECTORY=/var/run
      - AUSF_NAME=OAI_AUSF
      - SBI_IF_NAME=eth0
      - SBI_PORT=80
      - USE_FQDN_DNS=no
      - UDM_IP_ADDRESS=192.168.70.134
      - UDM_PORT=80
      - UDM_VERSION_NB=v1
      - UDM_FQDN=oai-udm
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    networks:
      common-control-network:
        ipv4_address: 192.168.70.135
    depends_on:
      oai-udm:
        condition: service_started

  # --- ACCESS AND MOBILITY MANAGEMENT FUNCTION (AMF) ---
  oai-amf:
    container_name: "oai-amf"
    image: oaisoftwarealliance/oai-amf:v1.5.0
    environment:
      - INSTANCE=0
      - TZ=Europe/Paris
      - PID_DIRECTORY=/var/run
      - AMF_NAME=oai-amf
      - EXTERNAL_AUSF=yes
      - EXTERNAL_UDM=yes
      - EXTERNAL_NSSF=yes
      
      - MCC=208
      - MNC=95
      - REGION_ID=128
      - AMF_SET_ID=1
      - SERVED_GUAMI_MCC_0=208
      - SERVED_GUAMI_MNC_0=95
      - SERVED_GUAMI_REGION_ID_0=128
      - SERVED_GUAMI_AMF_SET_ID_0=1

      - PLMN_SUPPORT_MCC=208
      - PLMN_SUPPORT_MNC=95
      - PLMN_SUPPORT_TAC=33456

      - SST_0=1
      - SD_0=000001
      - SST_1=2
      - SD_1=000002
      - SST_2=3
      - SD_2=000003
      - SST_3=4
      - SD_3=000004

      - AMF_INTERFACE_NAME_FOR_NGAP=eth1 
      - AMF_IPV4_ADDRESS_FOR_NGAP=192.168.71.138
      - AMF_INTERFACE_NAME_FOR_N11=eth0   
      - AMF_IPV4_ADDRESS_FOR_N11=192.168.70.138

      - AUSF_IPV4_ADDRESS=192.168.70.135
      - AUSF_NAME=oai-ausf
      - AUSF_FQDN=ausf.oai-5gcn.eur
      - NSSF_IPV4_ADDRESS=192.168.70.132
      - NSSF_NAME=oai-nssf
      - NSSF_FQDN=nssf.oai-5gcn.eur

      # IP CORRECTA DEL NRF SEGÚN LA TABLA
      - NRF_IPV4_ADDRESS=192.168.70.101 
      - NRF_PORT=80
      - NRF_API_VERSION=v1
      
      - UDM_IPV4_ADDRESS=192.168.70.134
      - UDR_IPV4_ADDRESS=192.168.70.133
      - NF_REGISTRATION=no
      - NRF_SELECTION=yes
      - SMF_SELECTION=yes
      - EXTERNAL_NRF=no
      - USE_FQDN_DNS=no
      - INT_ALGO_LIST=["NIA1" , "NIA2"]
      - CIPH_ALGO_LIST=["NEA1" , "NEA2"]
      - MOUNT_CONFIG=yes
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    entrypoint: /openair-amf/bin/oai_amf -c /openair-amf/etc/amf.conf -o
    volumes:
      - ./config/amf.conf:/openair-amf/etc/amf.conf
    networks:
      common-control-network:
        ipv4_address: 192.168.70.138
      ran-access-network:
        ipv4_address: 192.168.71.138
    depends_on:
      oai-ausf:
